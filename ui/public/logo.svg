<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0d1a18"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Inner glow rim -->
  <rect width="100" height="100" rx="22" fill="none"
        stroke="url(#g)" stroke-width="1" opacity="0.25"/>

  <!-- Subtle radial ambient -->
  <ellipse cx="50" cy="54" rx="38" ry="28"
           fill="url(#g)" opacity="0.06"/>

  <!-- Star / Muse spark — 4-point -->
  <g filter="url(#softglow)">
    <path d="M50 13 L52.2 20.5 L60 20.5 L53.9 25.1 L56.1 32.5 L50 28 L43.9 32.5 L46.1 25.1 L40 20.5 L47.8 20.5 Z"
          fill="url(#g)" opacity="0.95"/>
  </g>

  <!-- M — bold, geometric, lifted slightly to leave room for star -->
  <g filter="url(#glow)">
    <path d="M15 78 L15 42 L50 63 L85 42 L85 78"
          fill="none"
          stroke="url(#g)"
          stroke-width="9"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Thin baseline under M (classical reference) -->
  <line x1="15" y1="82" x2="85" y2="82"
        stroke="url(#g)" stroke-width="1.5"
        stroke-linecap="round" opacity="0.35"/>
</svg>
